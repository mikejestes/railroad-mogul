<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Railroad Mogul</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0d1b2a; overflow: hidden; }
      #game-root { position: relative; width: 100vw; height: 100vh; }
      #map-canvas { position: absolute; inset: 0; }
      #ui-overlay { position: absolute; inset: 0; pointer-events: none; }
      #ui-overlay > * { pointer-events: auto; }
    </style>
  </head>
  <body>
    <!-- The map canvas (PixiJS) and the React management overlay are siblings:
         two trees over one game, bridged by the store. -->
    <div id="game-root">
      <div id="map-canvas"></div>
      <div id="ui-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
